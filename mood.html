<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1840">
    <!-- 브라우저 뷰포트 너비를 1360px로 고정하여 페이지를 그리도록 설정 -->
    <title>Mood</title>

    <!-- 파비콘 연결 -->
    <link rel="shortcut icon" href="./images/favicon/favicon.png" type="image/x-icon">

    <!-- AOS 연결 -->
    <!-- transform과 함께 사용할 수 없음 -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <!-- 외부 css 연결 -->
    <link rel="stylesheet" href="css/mood_style.css">

    <!-- 폰트 연결 -->
    <link rel="stylesheet" href="./css/font.css">
</head>



<body>
    <!-- 페이지 전환 레이어 -->
    <div class="page-transition"></div>

    <!-- 커스텀 커서 -->
    <div class="custom-cursor"></div>

    <!-- 전체 -->
    <div id="wrap">

        <!-- top -->
        <div id="top_wrap">
            <div class="top_inner">
                <h1 class="top_logo">
                    <a href="./index.html">
                        <img src="./images/mood/top_logo.svg" alt="top_logo">
                    </a>
                </h1>
                <nav>
                    <ul class="top_menu">
                        <li><a href="./mood.html">MOOD</a></li>
                        <li><a href="./archive.html">ARCHIVE</a></li>
                        <li><a href="./goods.html">GOODS</a></li>
                        <li><a href="#">EXHIBITION</a></li>
                        <li><a href="./mylog.html">MY LOG</a></li>
                    </ul>
                </nav>
            </div>
        </div>
        <!-- top -->

        <!-- content -->
        <div id="mood_wrap">
            <div class="mood_inner">

                <!-- 상단 글자 -->
                <div class="inner_text">
                    <p>What is your mood?</p>
                    <p>당신의 감정에 어울리는 공간을 찾아보세요</p>
                </div>

                <!-- 중앙 도형 -->
                <div class="inner_icon" data-aos="zoom-in-up" data-aos-duration="2000">
                    <img src="./images/mood/pink.png" alt="mood_img">
                    <img src="./images/mood/blue.png" alt="mood_img">
                    <img src="./images/mood/orange.png" alt="mood_img">
                    <img src="./images/mood/green.png" alt="mood_img">
                    <img src="./images/mood/purple.png" alt="mood_img">
                </div>

                <!-- start 버튼 -->
                <div class="start_btn">
                    <a href="./mood_page.html">
                        <p>START</p>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- AOS 적용 -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>

    <!-- jQuery 불러오기 -->
    <script src="./js/jquery-4.0.0.min.js"></script>

    <script>
        $(document).ready(function () {
            // 1. 커스텀 커서가 마우스를 따라다니도록 설정
            const $cursor = $('.custom-cursor');
            $(window).on('mousemove', function (e) {
                $cursor.css({
                    left: e.clientX + 'px',
                    top: e.clientY + 'px'
                });
            });

            // 2. 링크, 버튼, 도형에 마우스를 올리면 커서가 커지게 설정
            // (start 버튼도 호버 효과가 먹히도록 .start_btn 추가)
            $('a, .inner_icon img, .start_btn').on('mouseenter', function () {
                $cursor.addClass('hovered');
            }).on('mouseleave', function () {
                $cursor.removeClass('hovered');
            });


            // 3. 페이지 전환 로직 (더 안전한 클래스 방식으로 통일)
            // 페이지 로드 시 레이어 걷어내기
            $(window).on('load', function () {
                $('.page-transition').addClass('loaded');
            });
            // 로딩 지연 대비 안전장치
            setTimeout(function () {
                $('.page-transition').addClass('loaded');
            }, 100);

            // 링크 클릭 시 화면 덮고 페이지 이동
            $('a').on('click', function (e) {
                const targetUrl = $(this).attr('href');

                // 내부 링크나 유효한 URL일 경우에만 전환 효과 실행
                if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('javascript:')) {
                    e.preventDefault(); // 즉시 이동 방지

                    // 레이어 나타나게 하기 (.loaded 빼고 .active 넣기)
                    $('.page-transition').removeClass('loaded').addClass('active');

                    // 0.6초 뒤 실제 페이지 이동
                    setTimeout(function () {
                        window.location.href = targetUrl;
                    }, 600);
                }
            });
        });
    </script>
</body>

</html>
